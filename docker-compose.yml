# ══════════════════════════════════════════════════════════════════════════════
#  Telecom AI Platform — Docker Compose (Full Stack)
# ══════════════════════════════════════════════════════════════════════════════
# Usage:
#   docker-compose up --build           # Start all services
#   docker-compose up prediction-api    # Start only the ML API
#   docker-compose down -v              # Stop and remove volumes

version: "3.9"

services:
  # ─── Infrastructure ────────────────────────────────────────────────────
  
  postgres:
    image: postgres:16-alpine
    container_name: telecom-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: telecom
      POSTGRES_PASSWORD: telecom_secure_2026
      POSTGRES_DB: telecom_ai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U telecom"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: telecom-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: telecom-kafka
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_LISTENERS: PLAINTEXT://kafka:29092,CONTROLLER://kafka:29093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    ports:
      - "9092:9092"

  minio:
    image: minio/minio:latest
    container_name: telecom-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minio_admin
      MINIO_ROOT_PASSWORD: minio_secure_2026
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

  # ─── ML Services ──────────────────────────────────────────────────────

  prediction-api:
    build:
      context: ./services/anomaly-service
      dockerfile: Dockerfile
    container_name: telecom-prediction-api
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      MODELS_DIR: /app/models/anomaly
      PROPHET_DIR: /app/models/prophet
    volumes:
      - ./ml/anomaly-detection/saved_models:/app/models/anomaly:ro
      - ./ml/traffic-forecasting/saved_models:/app/models/prophet:ro
      - prediction_uploads:/app/uploads
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── Microservices ─────────────────────────────────────────────────────

  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    container_name: telecom-auth
    restart: unless-stopped
    ports:
      - "8002:8000"
    environment:
      DATABASE_URL: postgresql://telecom:telecom_secure_2026@postgres:5432/telecom_ai
      REDIS_URL: redis://redis:6379
      SECRET_KEY: telecom-ai-jwt-secret-key-change-in-production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  telemetry-service:
    build:
      context: ./services/telemetry-ingestion-service
      dockerfile: Dockerfile
    container_name: telecom-telemetry
    restart: unless-stopped
    ports:
      - "8003:8000"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      - kafka

  # ─── Frontend ──────────────────────────────────────────────────────────

  web-dashboard:
    build:
      context: ./apps/web-dashboard
      dockerfile: Dockerfile
    container_name: telecom-dashboard
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://prediction-api:8001
    depends_on:
      - prediction-api

  # ─── API Gateway ───────────────────────────────────────────────────────

  nginx:
    image: nginx:alpine
    container_name: telecom-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - prediction-api
      - auth-service
      - web-dashboard

  # ─── Monitoring ────────────────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: telecom-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus

  grafana:
    image: grafana/grafana:10.4.0
    container_name: telecom-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  postgres_data:
  minio_data:
  prediction_uploads:
  prometheus_data:
  grafana_data:
