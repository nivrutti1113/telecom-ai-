apiVersion: apps/v1
kind: Deployment
metadata:
  name: anomaly-service
  namespace: telecom-ai
spec:
  replicas: 3
  selector:
    matchLabels:
      app: anomaly-service
  template:
    metadata:
      labels:
        app: anomaly-service
    spec:
      containers:
      - name: anomaly-service
        image: telecom-ai/anomaly-service:latest
        ports:
        - containerPort: 8001
        env:
        - name: KAFKA_BOOTSTRAP_SERVERS
          value: "kafka-service:9092"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: db-secrets
              key: url
---
apiVersion: v1
kind: Service
metadata:
  name: anomaly-service
  namespace: telecom-ai
spec:
  selector:
    app: anomaly-service
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8001
  type: LoadBalancer
