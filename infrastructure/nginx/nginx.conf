user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access_log.json main;

    sendfile        on;
    keepalive_timeout  65;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=mylimit:10m rate=10r/s;

    upstream auth_service {
        server auth-service:8000;
    }

    upstream anomaly_service {
        server anomaly-service:8001;
    }

    upstream digital_twin {
        server digital-twin:8003;
    }

    upstream telemetry_ingestion {
        server telemetry-ingestion:8002;
    }

    server {
        listen 80;

        location /api/v1/auth/ {
            limit_req zone=mylimit burst=20 nodelay;
            proxy_pass http://auth_service/api/v1/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/v1/anomaly/ {
            proxy_pass http://anomaly_service/api/v1/;
            proxy_set_header Host $host;
        }

        location /api/v1/twin/ {
            proxy_pass http://digital_twin/api/v1/;
            proxy_set_header Host $host;
        }

        location /api/v1/ingest/ {
            proxy_pass http://telemetry_ingestion/ingest;
            proxy_set_header Host $host;
        }

        location /health {
            return 200 '{"status":"UP"}';
            add_header Content-Type application/json;
        }
    }
}
